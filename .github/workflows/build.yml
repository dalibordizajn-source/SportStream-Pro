name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" > gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew assembleDebug || echo "Nastavljamo..."
